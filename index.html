<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"> 

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <section class="hero_section">
        <header>
            <nav class="navbar">
                <a href="#">Get the App</a>
                <div class="navbar_menu_container">
                    <a href="#" class="link">Investor Relations</a>
                    <a href="#" class="link">Add Restaurant</a>
                    <a href="#" class="link">Login</a>
                    <a href="#" class="link">Sign Up </a>
                    <a href="#" class="user_icon"><i class="fa-solid fa-user"></i></a>
                </div>
            </nav>
        </header>

        <div class="hero_section_container">
            <img class="hero_section_logo" src="./Images/heroSectionLogo.png" alt="Zomato Logo"/>
            <h1 class="hero_section_title">Discover the best food & drinks in your area</h1>

            <div class="hero_section_input_container">
                <div class="location"><i class="fa-solid fa-location-dot" style="color: rgb(209, 32, 32);"></i></div>
                <input class="input_container_location" type="text" placeholder="Durga Nagar churaha,vidisha" name="" id="">
                <div class="search"><i class="fa-solid fa-magnifying-glass" style="color: rgb(35, 55, 91);"></i></div>
                <input class="input_container_search" type="text" placeholder="Search for a restaurant, cuisine or a dish">

            </div>
        </div>
    </section>


    <section class="container we_offer">
        <div class="card">
            <img src="./Images/item1.png" alt="offer">
            <h2>Order Online</h2>
            <p>Stay home and order to your doorstep</p>
        </div>

        <div class="card">
            <img src="./Images/item2.png" alt="offer">
            <h2>Dining Out</h2>
            <p>View the city's favorite dining venues</p>
        </div>

        <div class="card">
            <img src="./Images/item3.png" alt="offer">
            <h2>Nightlife and Clubs</h2>
            <p>Explore the city's top nightlife outlets</p>
        </div>
    </section>
</body>
</html>
